<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victor IA en 60s - HyperFrames Presentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Space Grotesk', sans-serif; background: #000; color: #fff; overflow: hidden; }

    .stage {
      width: 1920px;
      height: 1080px;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      position: relative;
      font-size: 48px;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      opacity: 0;
    }

    /* ===== SLIDE 1: INTRO (0-8s) ===== */
    .slide-1 {
      data-start: "0s";
      data-duration: "8s";
      background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
      color: #e0e0e0;
    }

    .logo {
      font-family: 'Fraunces', serif;
      font-size: 96px;
      font-weight: 700;
      margin-bottom: 40px;
      letter-spacing: -2px;
      color: #d4af37;
      text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    .tagline {
      font-size: 36px;
      font-weight: 400;
      letter-spacing: 2px;
      color: #c0c0c0;
      max-width: 900px;
      line-height: 1.6;
    }

    /* ===== SLIDE 2: 18 SERVICIOS (8-30s) ===== */
    .slide-2 {
      data-start: "8s";
      data-duration: "22s";
      background: linear-gradient(135deg, rgba(0,51,102,0.1) 0%, rgba(0,0,0,0.8) 100%);
      padding: 80px 60px;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 30px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .service-icon {
      width: 140px;
      height: 140px;
      background: rgba(212, 175, 55, 0.15);
      border: 2px solid rgba(212, 175, 55, 0.3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      transition: all 0.3s ease;
    }

    .service-icon:hover {
      background: rgba(212, 175, 55, 0.25);
      border-color: rgba(212, 175, 55, 0.6);
      transform: scale(1.05);
    }

    .service-icon.highlight {
      background: rgba(212, 175, 55, 0.4);
      border-color: rgba(212, 175, 55, 0.8);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
    }

    /* ===== SLIDE 3: KPIs (30-48s) ===== */
    .slide-3 {
      data-start: "30s";
      data-duration: "18s";
      background: linear-gradient(180deg, rgba(51,51,51,0.1) 0%, #000 100%);
      justify-content: space-around;
      padding: 60px;
    }

    .kpi-container {
      display: flex;
      gap: 80px;
      justify-content: center;
      width: 100%;
      flex-wrap: wrap;
    }

    .kpi {
      text-align: center;
      min-width: 280px;
    }

    .kpi-number {
      font-family: 'Fraunces', serif;
      font-size: 120px;
      font-weight: 700;
      color: #d4af37;
      margin: 20px 0;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
      letter-spacing: -3px;
    }

    .kpi-label {
      font-size: 28px;
      color: #b0b0b0;
      letter-spacing: 1px;
      margin-top: 20px;
    }

    .kpi-bar {
      width: 200px;
      height: 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      margin: 20px auto;
      overflow: hidden;
    }

    .kpi-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #d4af37 0%, #f0d968 100%);
      width: 0%;
      transition: width 0.4s ease;
    }

    /* ===== SLIDE 4: CTA (48-60s) ===== */
    .slide-4 {
      data-start: "48s";
      data-duration: "12s";
      background: linear-gradient(135deg, #000 0%, rgba(212, 175, 55, 0.05) 100%);
    }

    .cta-logo {
      font-family: 'Fraunces', serif;
      font-size: 84px;
      font-weight: 700;
      color: #d4af37;
      margin-bottom: 40px;
    }

    .cta-text {
      font-size: 32px;
      color: #d4af37;
      margin: 20px 0;
      letter-spacing: 1px;
    }

    .cta-subtitle {
      font-size: 24px;
      color: #888;
      margin-top: 30px;
      letter-spacing: 2px;
    }

    .cta-location {
      font-size: 18px;
      color: #666;
      margin-top: 40px;
      letter-spacing: 1px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <!-- SLIDE 1: ¿Quiénes somos? (0-8s) -->
    <div class="slide slide-1" data-from="0s" data-to="8s">
      <div class="logo" style="animation: slideDown 0.8s ease-out;">VICTOR IA</div>
      <div class="tagline" style="animation: slideUp 0.8s ease-out 0.3s both;">
        Construimos negocios que piensan, que aprenden... y que crecen contigo
      </div>
    </div>

    <!-- SLIDE 2: 18 Servicios (8-30s) -->
    <div class="slide slide-2" data-from="8s" data-to="30s">
      <div class="services-grid">
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 0.1s both;">🌐</div> <!-- Web -->
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 0.2s both;">⚙️</div> <!-- Automation -->
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 0.3s both;">🎬</div> <!-- Video -->
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 0.4s both;">♿</div> <!-- Inclusivo -->
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 0.5s both;">🤖</div> <!-- Agentes -->
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 0.6s both;">↩️</div> <!-- Reactivation -->
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 0.7s both;">📊</div>
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 0.8s both;">🔐</div>
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 0.9s both;">💼</div>
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 1.0s both;">📱</div>
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 1.1s both;">🎨</div>
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 1.2s both;">📈</div>
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 1.3s both;">🧠</div>
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 1.4s both;">🔗</div>
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 1.5s both;">📚</div>
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 1.6s both;">🌍</div>
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 1.7s both;">🎯</div>
        <div class="service-icon" style="animation: slideUp 0.4s ease-out 1.8s both;">✨</div>
      </div>
    </div>

    <!-- SLIDE 3: KPIs (30-48s) -->
    <div class="slide slide-3" data-from="30s" data-to="48s">
      <div class="kpi-container">
        <div class="kpi" style="animation: slideUp 0.5s ease-out 0.2s both;">
          <div class="kpi-label">Retorno de Inversión</div>
          <div class="kpi-number" data-value="3.2">0.0</div>
          <span style="color: #999; font-size: 36px;">×</span>
        </div>
        <div class="kpi" style="animation: slideUp 0.5s ease-out 0.4s both;">
          <div class="kpi-label">Más Conversión</div>
          <div class="kpi-number" data-value="68">0</div>
          <span style="color: #999; font-size: 36px;">%</span>
          <div class="kpi-bar">
            <div class="kpi-bar-fill" style="width: 0%;"></div>
          </div>
        </div>
        <div class="kpi" style="animation: slideUp 0.5s ease-out 0.6s both;">
          <div class="kpi-label">Menos Costos</div>
          <div class="kpi-number" data-value="-40">0</div>
          <span style="color: #999; font-size: 36px;">%</span>
        </div>
        <div class="kpi" style="animation: slideUp 0.5s ease-out 0.8s both;">
          <div class="kpi-label">Menos Tiempo</div>
          <div class="kpi-number" data-value="-55">0</div>
          <span style="color: #999; font-size: 36px;">%</span>
        </div>
      </div>
    </div>

    <!-- SLIDE 4: CTA (48-60s) -->
    <div class="slide slide-4" data-from="48s" data-to="60s">
      <div class="cta-logo" style="animation: slideDown 0.6s ease-out;">VICTOR IA</div>
      <div class="cta-text" style="animation: slideUp 0.6s ease-out 0.2s both;">Inteligencia que entiende tu negocio</div>
      <div class="cta-subtitle" style="animation: slideUp 0.6s ease-out 0.4s both;">Hablemos hoy</div>
      <div class="cta-location" style="animation: slideUp 0.6s ease-out 0.6s both;">Playa del Carmen, México</div>
    </div>
  </div>

  <!-- AUDIO TRACK -->
  <audio id="vo" style="display: none;">
    <source src="/audio/vo-influence-ia/01_hyperframes_60s.mp3" type="audio/mpeg">
  </audio>

    console.log('Timing: Slides sync to data-from/data-to attributes');
  </script>
</body>
</html>
