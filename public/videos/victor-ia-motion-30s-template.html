<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor IA - Motion 30s</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        body {
            width: 1920px;
            height: 1080px;
            background: #0a0e27;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        .stage {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
        }

        /* Scene 1: Stressed Business Owner (0-8s) */
        .scene-1 {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 1;
        }

        .scene-1-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #0a0e27, #1a1f3a);
            z-index: 1;
        }

        .scene-1-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(200, 150, 80, 0.15) 0%, transparent 70%);
            z-index: 2;
        }

        .scene-1-content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }

        .stressed-text {
            font-size: 96px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            line-height: 1.2;
            max-width: 1400px;
            opacity: 0;
        }

        .stress-indicator {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ff6b6b;
            border-radius: 50%;
            opacity: 0;
        }

        /* Scene 2: Digital Transformation (8-18s) */
        .scene-2 {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            background: linear-gradient(135deg, #0a0e27 0%, #1a2f5a 100%);
            z-index: 5;
        }

        .neural-network {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 6;
        }

        .neural-node {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #c89650, #8b6f47);
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 20px rgba(200, 150, 80, 0.6);
        }

        .digital-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 7;
        }

        .digital-text h2 {
            font-size: 80px;
            font-weight: 700;
            color: #c89650;
            text-align: center;
            opacity: 0;
            text-shadow: 0 0 30px rgba(200, 150, 80, 0.3);
        }

        /* Scene 3: Victor IA Reveal (18-30s) */
        .scene-3 {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9;
        }

        .victor-ia-logo {
            font-size: 120px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -2px;
            opacity: 0;
            text-shadow: 0 0 40px rgba(200, 150, 80, 0.4);
            margin-bottom: 40px;
        }

        .victor-ia-tagline {
            font-size: 48px;
            font-weight: 300;
            color: #c89650;
            text-align: center;
            opacity: 0;
            max-width: 1200px;
            line-height: 1.4;
        }

        .cta-button {
            margin-top: 60px;
            padding: 20px 60px;
            font-size: 28px;
            font-weight: 600;
            color: #0a0e27;
            background: #c89650;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            opacity: 0;
            box-shadow: 0 10px 40px rgba(200, 150, 80, 0.3);
        }

        /* Preload images */
        #preload {
            display: none;
        }
    </style>
</head>
<body>
    <div id="preload"></div>

    <div class="stage">
        <!-- Scene 1: Stressed Business Owner -->
        <div class="scene-1">
            <div class="scene-1-bg"></div>
            <div class="scene-1-overlay"></div>
            <div class="scene-1-content">
                <div class="stressed-text">Tu negocio trabaja duro.</div>
                <div class="stress-indicator"></div>
            </div>
        </div>

        <!-- Scene 2: Digital Transformation -->
        <div class="scene-2">
            <canvas id="neural-canvas"></canvas>
            <div class="neural-network" id="neural-nodes"></div>
            <div class="digital-text">
                <h2>La IA que piensa por ti</h2>
            </div>
        </div>

        <!-- Scene 3: Victor IA Reveal -->
        <div class="scene-3">
            <div class="victor-ia-logo">Victor IA</div>
            <div class="victor-ia-tagline">Tu inteligencia artificial ejecutiva</div>
            <button class="cta-button">Descubre más</button>
        </div>
    </div>

    <audio id="voAudio" src="../audio/vo-influence-ia/02_motion_30s.mp3"></audio>

    <script>
        // Neural nodes animation
        const neuralContainer = document.getElementById('neural-nodes');
        const nodeCount = 40;
        const nodes = [];

        for (let i = 0; i < nodeCount; i++) {
            const node = document.createElement('div');
            node.className = 'neural-node';
            node.style.left = Math.random() * 100 + '%';
            node.style.top = Math.random() * 100 + '%';
            neuralContainer.appendChild(node);
            nodes.push(node);
        }

        // Master timeline
        const tl = gsap.timeline({ paused: false });

        // Scene 1: Stressed (0-8s)
        tl.fromTo('.stressed-text', {
            opacity: 0,
            y: 50
        }, {
            opacity: 1,
            y: 0,
            duration: 1.5
        }, 0.5);

        tl.to('.stress-indicator', {
            opacity: 1,
            scale: 1.5,
            repeat: 3,
            yoyo: true,
            duration: 0.6
        }, 1);

        // Scene 1 to Scene 2 transition (7-8.5s)
        tl.to('.scene-1', {
            opacity: 0,
            duration: 1
        }, 7);

        // Scene 2: Digital transformation (8-18s)
        tl.to('.scene-2', {
            opacity: 1,
            duration: 0.5
        }, 7.5);

        // Neural nodes appear and animate
        nodes.forEach((node, i) => {
            tl.fromTo(node, {
                opacity: 0,
                scale: 0
            }, {
                opacity: 1,
                scale: 1,
                duration: 0.4
            }, 8 + (i * 0.05));

            tl.to(node, {
                y: gsap.utils.random(-50, 50),
                x: gsap.utils.random(-50, 50),
                duration: 2,
                ease: 'sine.inOut'
            }, 8 + (i * 0.05));
        });

        // Digital text
        tl.fromTo('.digital-text h2', {
            opacity: 0,
            scale: 0.8
        }, {
            opacity: 1,
            scale: 1,
            duration: 1
        }, 10);

        tl.to('.digital-text h2', {
            opacity: 1,
            duration: 2
        }, 12);

        // Scene 2 to Scene 3 transition (17-18.5s)
        tl.to('.scene-2', {
            opacity: 0,
            duration: 1
        }, 17);

        // Scene 3: Victor IA reveal (18-30s)
        tl.to('.scene-3', {
            opacity: 1,
            duration: 0.5
        }, 17.5);

        tl.fromTo('.victor-ia-logo', {
            opacity: 0,
            scale: 0.5,
            y: 100
        }, {
            opacity: 1,
            scale: 1,
            y: 0,
            duration: 1.2
        }, 18.5);

        tl.fromTo('.victor-ia-tagline', {
            opacity: 0,
            y: 30
        }, {
            opacity: 1,
            y: 0,
            duration: 1
        }, 19.5);

        tl.fromTo('.cta-button', {
            opacity: 0,
            scale: 0.9
        }, {
            opacity: 1,
            scale: 1,
            duration: 0.8
        }, 20.5);

        // Hold final scene (20.5-30s)
        tl.to('.cta-button', {
            boxShadow: '0 10px 60px rgba(200, 150, 80, 0.6)',
            duration: 0.5,
            repeat: -1,
            yoyo: true
        }, 20.5);

        // Total duration: 30 seconds
        tl.totalDuration(30);

        // Start animation
        window.addEventListener('load', () => {
            tl.play();
        });
    </script>
</body>
</html>
