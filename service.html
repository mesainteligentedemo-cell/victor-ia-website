  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --warm:     #F8F7F5;
      --ink:      #0E0F12;
      --muted:    rgba(14,15,18,0.45);
      --rule:     rgba(14,15,18,0.09);
      --amber-dk: #FFAA17;
      --gold:     #FFAA17;
    }
    html, body {
      height: 100%; overflow: hidden;
      background: var(--warm);
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink); cursor: none;
      -webkit-font-smoothing: antialiased;
    }
    @media (max-width: 767px) { html, body { overflow: auto; overscroll-behavior-y: contain; } }
    @media (pointer: coarse) { body { cursor: default; } }

    /* ── Marble background ── */
    #svc-bg {
      position: fixed; inset: 0; z-index: 0;
      background-size: cover;
      background-position: 50% 30%;
      background-repeat: no-repeat;
      filter: sepia(0.06) brightness(1.01) contrast(1.05) saturate(0.9);
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      will-change: transform;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    #svc-video {
      position: fixed; inset: 0; z-index: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: sepia(0.06) brightness(1.01) contrast(1.05) saturate(0.9);
      transform: translateZ(0); -webkit-transform: translateZ(0);
      will-change: transform; backface-visibility: hidden; -webkit-backface-visibility: hidden;
      opacity: 0; transition: opacity 0.8s ease;
      pointer-events: none;
    }
    #svc-video.playing { opacity: 1; }

    /* ── Canvas reveal ── */
    #revealCanvas {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }

    /* ── Permanent content fog — always readable, regardless of canvas ── */
    #svc-fog {
      position: fixed; inset: 0; z-index: 9; pointer-events: none;
      background:
        linear-gradient(to right,
          rgba(248,247,245,0.82) 0%,
          rgba(248,247,245,0.55) 38%,
          rgba(248,247,245,0.18) 58%,
          transparent 72%),
        linear-gradient(to top,
          rgba(248,247,245,0.78) 0%,
          rgba(248,247,245,0.45) 28%,
          transparent 55%);
    }

    /* ── Cursor ── */
    .cursor { position: fixed; width: 5px; height: 5px; background: var(--ink); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
    .cursor-ring { position: fixed; width: 32px; height: 32px; border: 1px solid rgba(14,15,18,0.3); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width 0.35s ease, height 0.35s ease; }
    @media (max-width: 640px) { .cursor, .cursor-ring { display: none; } }

    /* ── Nav ── */
    .svc-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      padding: 0 clamp(1.5rem,4vw,3rem);
      height: 60px; display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(248,247,245,0.85) 0%, transparent 100%);
    }
    .svc-back {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink); text-decoration: none; opacity: 0.85; transition: opacity 0.2s;
    }
    .svc-back:hover { opacity: 1; }
    .svc-back svg { width: 16px; height: 16px; }
    .svc-back-logo {
      height: 22px; width: auto; mix-blend-mode: multiply; display: block;
      opacity: 1;
      image-rendering: -webkit-optimize-contrast;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .svc-nav-cta {
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--amber-dk); text-decoration: none;
      border: 1px solid rgba(255,170,23,0.35); padding: 0.5rem 1.1rem;
      transition: background 0.25s;
    }
    .svc-nav-cta:hover { background: rgba(255,170,23,0.08); }

    /* ── Main layout ── */
    .svc-main {
      position: fixed; inset: 0; z-index: 10;
      display: grid; grid-template-columns: 1fr;
      align-items: end;
      padding: 60px clamp(1.5rem,5vw,3rem) clamp(3rem,8vh,5rem);
      pointer-events: none;
    }
    @media (min-width: 900px) {
      .svc-main { grid-template-columns: 1fr 280px; align-items: stretch; gap: 2rem; }
    }

    /* ── Content ── */
    .svc-content {
      pointer-events: auto;
      display: flex; flex-direction: column; justify-content: flex-end;
      max-width: 580px;
    }
    .svc-eyebrow {
      font-size: 0.6rem; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--amber-dk); margin-bottom: 1rem; display: block;
    }
    .svc-title {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(28px,6vw,58px); font-weight: 400; font-style: italic;
      line-height: 1.12; letter-spacing: -0.02em; color: var(--ink);
      margin-bottom: 1.5rem;
      text-shadow: 0 0 40px rgba(248,247,245,1), 0 0 80px rgba(248,247,245,0.9);
    }
    .svc-brief {
      font-size: clamp(14px,2vw,17px); font-weight: 300;
      color: var(--muted); line-height: 1.65; margin-bottom: 1rem;
      text-shadow: 0 0 24px rgba(248,247,245,1), 0 0 48px rgba(248,247,245,0.8);
    }
    .svc-desc { max-height: 0; overflow: hidden; transition: max-height 0.6s cubic-bezier(0.16,1,0.3,1); }
    .svc-desc.open { max-height: 40vh; overflow-y: auto; }
    .svc-desc p { font-size: 13px; color: var(--muted); line-height: 1.75; margin-bottom: 0.85rem; }
    .svc-read-more {
      font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink); border-bottom: 1px solid var(--rule);
      padding-bottom: 2px; cursor: pointer; display: inline-block;
      margin-bottom: 1.75rem; background: none; border-top: none;
      border-left: none; border-right: none; font-family: inherit;
      transition: border-color 0.2s;
    }
    .svc-read-more:hover { border-bottom-color: var(--ink); }
    .svc-cta {
      display: inline-flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 2rem; border: 1px solid var(--ink); background: none;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink); text-decoration: none; position: relative; overflow: hidden;
      align-self: flex-start; pointer-events: auto; transition: color 0.35s;
    }
    .svc-cta::before { content:''; position:absolute; inset:0; background:var(--ink); transform:translateX(-101%); transition:transform 0.4s cubic-bezier(0.16,1,0.3,1); }
    .svc-cta:hover::before { transform: translateX(0); }
    .svc-cta span, .svc-cta svg { position: relative; z-index: 1; }
    .svc-cta:hover { color: var(--warm); }
    .svc-cta svg { width: 18px; height: 9px; }

    /* ── Sidebar ── */
    .svc-sidebar { display: none; pointer-events: auto; flex-direction: column; justify-content: center; gap: 0; border-left: 1px solid var(--rule); padding-left: 1.5rem; overflow-y: auto; align-self: center; max-height: calc(100vh - 120px); background: rgba(248,247,245,0.72); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 1.5rem; border-radius: 2px; }
    @media (min-width: 900px) { .svc-sidebar { display: flex; } }
    .svc-side-link { display: flex; align-items: baseline; gap: 0.6rem; padding: 0.45rem 0; border-bottom: 1px solid transparent; transition: border-color 0.2s; text-decoration: none; color: var(--ink); }
    .svc-side-link:hover, .svc-side-link.active { border-bottom-color: var(--rule); }
    .svc-side-n { font-size: 0.5rem; color: var(--amber-dk); letter-spacing: 0.14em; min-width: 16px; flex-shrink: 0; }
    .svc-side-name { font-size: 0.68rem; font-weight: 400; color: var(--muted); line-height: 1.3; transition: color 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .svc-side-link:hover .svc-side-name, .svc-side-link.active .svc-side-name { color: var(--ink); }
    .svc-side-link.active .svc-side-name { font-weight: 600; }

    /* ── Footer label ── */
    .svc-footer-label { position: fixed; bottom: 1.25rem; right: clamp(1.5rem,4vw,3rem); z-index: 10; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); pointer-events: none; }

    /* ── Prev/Next ── */
    .svc-prevnext { position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 1rem; align-items: center; pointer-events: auto; }
    .svc-prev, .svc-next { font-size: 0.56rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); transition: color 0.2s; cursor: pointer; background: none; border: none; font-family: inherit; padding: 0; }
    .svc-prev:hover, .svc-next:hover { color: var(--ink); }
    .svc-prevnext-sep { font-size: 10px; color: var(--rule); }

    /* ── Nav dots ── */
    .svc-dots { position: fixed; bottom: 1.25rem; left: clamp(1.5rem,4vw,3rem); z-index: 10; display: flex; gap: 6px; align-items: center; pointer-events: none; }
    .svc-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--rule); transition: background 0.25s; }
    .svc-dot.active { background: var(--ink); }

    /* ── Mobile portrait ── */
    @media (max-width: 767px) {
      .svc-main {
        position: relative; padding-top: 80px;
        min-height: 100vh; align-items: flex-end;
        padding-bottom: 5rem;
      }
      .svc-title { font-size: clamp(26px,7vw,40px); margin-bottom: 1rem; }
      .svc-brief { font-size: 15px; margin-bottom: 0.75rem; }
      .svc-desc.open { max-height: none; overflow: visible; }
      .svc-footer-label { display: none; }
      .svc-dots { display: none; }
      .svc-prevnext { bottom: 1rem; }
      #svc-fog {
        background:
          linear-gradient(to top,
            rgba(248,247,245,0.92) 0%,
            rgba(248,247,245,0.65) 30%,
            rgba(248,247,245,0.20) 55%,
            transparent 70%),
          linear-gradient(to right,
            rgba(248,247,245,0.60) 0%,
            transparent 60%);
      }
    }

    /* ── Mobile landscape ── */
    @media (max-width: 900px) and (orientation: landscape) {
      html, body { overflow: auto; }
      .svc-main {
        position: relative; padding-top: 65px;
        min-height: 100vh; align-items: flex-end;
        padding-bottom: 4rem;
        grid-template-columns: 1fr;
      }
      .svc-title { font-size: clamp(20px,4.5vw,32px); margin-bottom: 0.75rem; }
      .svc-brief { font-size: 13px; line-height: 1.5; margin-bottom: 0.6rem; }
      .svc-read-more { margin-bottom: 1rem; }
      .svc-cta { padding: 0.65rem 1.5rem; font-size: 0.6rem; }
      .svc-sidebar { display: none !important; }
      .svc-dots { display: none; }
      .svc-prevnext { bottom: 0.75rem; }
      .svc-footer-label { display: none; }
      #svc-fog {
        background:
          linear-gradient(to top,
            rgba(248,247,245,0.90) 0%,
            rgba(248,247,245,0.55) 28%,
            transparent 52%),
          linear-gradient(to right,
            rgba(248,247,245,0.65) 0%,
            transparent 55%);
      }
    }

    /* ── Nav on mobile ── */
    @media (max-width: 480px) {
      .svc-nav { padding: 0 1.2rem; }
      .svc-back span { display: none; }
      .svc-nav-cta { font-size: 0.55rem; padding: 0.45rem 0.8rem; }
    }

    /* ── View Transitions ── */
    @view-transition { navigation: auto; }
    ::view-transition-old(root) { animation: vt-out 0.4s cubic-bezier(0.4,0,1,1) both; }
    ::view-transition-new(root) { animation: vt-in  0.4s cubic-bezier(0,0,0.2,1) both; }
    @keyframes vt-out { from{opacity:1} to{opacity:0} }
    @keyframes vt-in  { from{opacity:0} to{opacity:1} }

    /* ── Loader ── */
    #svc-loader {
      position: fixed; inset: 0; z-index: 2000;
      background: var(--warm);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    #svc-loader.hidden { opacity: 0; pointer-events: none; }
    .sl-wordmark {
      height: clamp(56px,10vw,84px); width: auto;
      mix-blend-mode: multiply;
      margin-bottom: 2.2rem; user-select: none; display: block;
      image-rendering: -webkit-optimize-contrast;
    }
    .sl-track { width: clamp(120px,22vw,200px); height: 1px; background: var(--rule); position: relative; }
    .sl-fill  { position: absolute; left:0; top:0; height:100%; background: var(--ink); width:0%; transition: width 0.06s linear; }

    /* ── Cursor label ── */
    .cursor-label {
      position: fixed; pointer-events: none; z-index: 9997;
      font-size: 0.52rem; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--ink); opacity: 0;
      transform: translate(-50%, 22px);
      transition: opacity 0.18s ease;
      white-space: nowrap; user-select: none;
    }
    .cursor-label.show { opacity: 0.65; }

    /* ── C-tier ── */
    ::selection { background: #FFAA17; color: #0E0F12; }
    a:focus-visible, button:focus-visible { outline: 2px solid #FFAA17; outline-offset: 4px; }
    .svc-title { font-optical-sizing: auto; }
    .skip-link {
      position: fixed; top: -100%; left: 1rem; z-index: 9999;
      background: var(--ink); color: var(--warm);
      padding: 0.5rem 1.2rem; font-size: 0.7rem; letter-spacing: 0.1em;
      text-decoration: none; transition: top 0.2s;
    }
    .skip-link:focus { top: 1rem; }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      @view-transition { navigation: none; }
      * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }

    /* ── Lenis ── */
    html.lenis, html.lenis body { height: auto; }
    .lenis.lenis-smooth { scroll-behavior: auto !important; }

    /* ── Magnetic CTA ── */
    .svc-cta { will-change: transform; }

    /* ── Content reveal ── */
    .svc-content {
      opacity: 0; transform: translateY(22px);
      animation: svc-in 0.85s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }
    @keyframes svc-in { to { opacity:1; transform:translateY(0); } }
    @media (prefers-reduced-motion: reduce) { .svc-content { animation: none; opacity:1; transform:none; } }

    /* ── has-scrub: Módulo 1 (hero) + Módulo 2 (scrub) en flujo normal ── */
    html.has-scrub, html.has-scrub body { height: auto; overflow-y: auto; overscroll-behavior-y: contain; }
    /* Módulo 1 ocupa exactamente 1 viewport — el scrub empieza justo debajo */
    body.has-scrub .svc-main {
      position: relative !important; inset: auto !important;
      height: 100svh; z-index: 10;
      display: grid; grid-template-columns: 1fr;
      align-items: end;
      padding: 60px clamp(1.5rem,5vw,3rem) clamp(3rem,8vh,5rem);
      pointer-events: none;
    }
    @media (min-width: 900px) {
      body.has-scrub .svc-main { grid-template-columns: 1fr 280px; align-items: stretch; gap: 2rem; }
    }
    /* nav se adapta al fondo oscuro del Módulo 2 (scrub) */
    body.has-scrub.nav-on-dark .svc-nav {
      background: linear-gradient(to bottom, rgba(8,9,13,0.65) 0%, transparent 100%);
    }
    body.has-scrub.nav-on-dark .svc-back { color: rgba(248,247,245,0.88); }
    body.has-scrub.nav-on-dark .svc-back-logo {
      mix-blend-mode: normal;
      filter: brightness(0) invert(1);
    }
    body.has-scrub.nav-on-dark .svc-nav-cta {
      color: rgba(255,170,23,0.95);
      border-color: rgba(255,170,23,0.45);
    }

    /* ── Módulo 2: scroll-scrub cuadro por cuadro ── */
    #svc-scrub-zone { display: none; height: 360vh; position: relative; z-index: 15; }
    body.has-scrub #svc-scrub-zone { display: block; }
    #svcScrubSticky {
      position: sticky; top: 0;
      height: 100svh; overflow: hidden;
      background: #08090D; z-index: 20;
    }
    #svcScrubCanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    #svcScrubOverlay {
      position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background:
        linear-gradient(to top, rgba(8,9,13,0.78) 0%, rgba(8,9,13,0.32) 38%, transparent 62%),
        linear-gradient(to bottom, rgba(8,9,13,0.45) 0%, transparent 18%);
    }
    #svcScrubText {
      position: absolute; bottom: clamp(3rem,8vh,6rem);
      left: clamp(1.5rem,5vw,3.5rem); max-width: 680px;
    }
    .svc-scrub-ey {
      font-size: 0.6rem; letter-spacing: 0.32em; text-transform: uppercase;
      color: rgba(248,247,245,0.5); display: block; margin-bottom: 1rem;
      font-family: 'Space Grotesk', sans-serif;
    }
    .svc-scrub-hl {
      font-family: 'Instrument Serif', serif; font-weight: 400;
      font-size: clamp(2.5rem,6.5vw,5.5rem); letter-spacing: -0.03em;
      line-height: 0.91; color: #F8F7F5; font-optical-sizing: auto;
      font-style: italic;
    }
    #svcScrubPbar {
      position: absolute; right: clamp(1.5rem,3vw,3rem); top: 50%;
      transform: translateY(-50%);
      width: 1px; height: 100px; background: rgba(248,247,245,0.1); z-index: 3;
    }
    #svcScrubPbarFill { width: 100%; background: rgba(255,170,23,0.65); height: 0%; transition: height 0.1s linear; }
    #svcScrubHint {
      position: absolute; bottom: clamp(1.5rem,3vh,2.5rem);
      left: 50%; transform: translateX(-50%);
      font-size: 0.52rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(248,247,245,0.3); z-index: 3; white-space: nowrap;
      animation: svc-hint-pulse 2.5s ease-in-out infinite;
    }
    @keyframes svc-hint-pulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }
    @media (max-width: 640px) {
      .svc-scrub-hl { font-size: clamp(2rem,9vw,3.5rem); }
      #svcScrubPbar { display: none; }
    }
  </style>
  <script>
    /* Bloquea pull-to-refresh (arriba) y elastic bounce (abajo) en iOS Safari */
    /* Excluye el scroll-scrub-zone para no bloquear el scrub en iOS          */
    (function(){
      var _startY = 0;
      document.addEventListener('touchstart', function(e){ _startY = e.touches[0].pageY; }, { passive: true });
      document.addEventListener('touchmove', function(e){
        /* Si el toque viene del scrub-zone, dejar pasar — el scroll es necesario */
        var scrubZone = document.getElementById('svc-scrub-zone');
        if (scrubZone && scrubZone.contains(e.target)) return;
        var dy = e.touches[0].pageY - _startY;
        var atTop    = window.scrollY <= 0 && dy > 0;
        var atBottom = (window.scrollY + window.innerHeight) >= document.documentElement.scrollHeight && dy < 0;
        if(atTop || atBottom) e.preventDefault();
      }, { passive: false });
    })();
  </script>
</head>
<body>

  <a href="#svc-main" class="skip-link">Saltar al contenido</a>

  var SVCS = [
    /* ── PRESENCIA DIGITAL ── */
    { id:'01', bg:'assets/svc-bg-01.jpg', title:'Sitios Web de Alto Impacto', brief:'Tu presencia digital que cierra tratos antes de que hablen contigo.', desc:'El sitio correcto no informa — convierte. Construimos experiencias web de nivel internacional que posicionan tu marca como líder desde el primer segundo: scroll cinemático, animaciones que paralizan, arquitectura diseñada para que el visitante tome acción.\n\nMientras la competencia tiene páginas genéricas, tú tienes una experiencia que paraliza, convierte y vende. Cada elemento — tipografía, espaciado, velocidad, mobile — está calibrado para un solo objetivo: que el visitante diga "quiero esto".\n\nEntregamos diseño, desarrollo, SEO técnico y optimización de velocidad. Tu sitio cargando en menos de 2 segundos, con LCP < 2.5s — porque cada segundo de carga vale dinero.' },
    { id:'02', bg:'assets/svc-bg-16.jpg', title:'Apps & Experiencias Web', brief:'Herramientas digitales que tu equipo realmente usa.', desc:'Apps web, portales internos, dashboards operativos y herramientas a medida que tu equipo adopta porque están diseñadas para fluir — no para instruirse.\n\nCuando la herramienta se adapta al flujo del usuario, la adopción llega sola. Creamos interfaces que eliminan fricción, reducen errores y aceleran la toma de decisiones en cada nivel de tu organización.\n\nDesarrolladas con React o Next.js, con autenticación, roles, notificaciones en tiempo real e integración directa a los sistemas que ya usas.' },
    { id:'03', bg:'assets/svc-bg-15.jpg', title:'Visualización 3D de Producto', brief:'Vende algo que aún no existe. Cierra antes de construir.', desc:'Renders fotorrealistas y visualizaciones 3D de productos, espacios y desarrollos arquitectónicos que hacen que el cliente imagine la experiencia antes de la entrega.\n\nVende propiedades antes de poner el primer ladrillo. Presenta productos antes de fabricarlos. El render correcto no muestra tu producto — muestra el estilo de vida que viene con él.\n\nUn cliente que ya se visualizó adentro tiene 3× más probabilidad de cerrar. Cada visualización es una inversión en decisiones de compra más rápidas.' },
    { id:'04', bg:'assets/svc-bg-04.jpg', title:'Configuradores 3D Interactivos', brief:'Tu cliente diseña su compra en tiempo real — y ya no quiere otra.', desc:'Herramientas que permiten a tus clientes personalizar productos, unidades o espacios desde cualquier dispositivo en tiempo real: elige color, acabado, distribución y ve el resultado al instante.\n\nCuando el cliente configura su propia compra, la decisión se vuelve emocional. El vendedor que nunca duerme. El que convierte la imaginación en una decisión de compra sin fricción ni presión.\n\nIntegrado a tu catálogo y CRM: cada configuración es un lead calificado con preferencias documentadas, listo para que tu equipo cierre.' },
    /* ── INTELIGENCIA ARTIFICIAL ── */
    { id:'05', bg:'assets/svc-bg-08.jpg', title:'Agentes IA con Voz y Texto', brief:'El equipo que nunca para de cerrar — ni a las 3am.', desc:'Agentes conversacionales con voz y texto que atienden, califican y cierran leads en WhatsApp, web y teléfono — las 24 horas, los 7 días, sin vacaciones ni mal humor.\n\nMientras tu equipo duerme, el agente califica leads, responde preguntas frecuentes, agenda citas y hace seguimiento automático. Todo queda registrado. Todo llega a tu CRM en tiempo real.\n\nEntrenado con el lenguaje, los productos y las objeciones específicas de tu empresa — no es un bot genérico, es tu mejor vendedor que nunca descansa.' },
    { id:'06', bg:'assets/svc-bg-06.jpg', title:'Automatización de Operaciones', brief:'Tu equipo solo hace lo que genera valor real. El resto, fluye solo.', desc:'Eliminamos el trabajo repetitivo que frena a tu equipo: cotizaciones, seguimiento de leads, reportes, notificaciones, facturación y coordinación — todo en flujos automáticos que trabajan sin supervisión.\n\nSi se puede describir como proceso, se puede automatizar. Y si se automatiza, se hace mejor, más rápido y sin errores humanos. Tu equipo deja de administrar para empezar a cerrar.\n\nConectamos todas las herramientas que ya usas: CRM, WhatsApp, correo, Google Sheets, calendarios y más. Sin reemplazar lo que funciona, solo haciéndolo trabajar junto.' },
    { id:'07', bg:'assets/svc-bg-10.jpg', title:'IA por Departamento', brief:'Inteligencia específica en cada área. No IA genérica — IA tuya.', desc:'Ventas con agentes de cierre inteligentes. Marketing con generación de contenido automatizada. Operaciones con flujos que no fallan. Finanzas con predicción de ingresos. RRHH con screening y onboarding automático.\n\nNo es IA genérica instalada en tu empresa — es inteligencia entrenada con los procesos, el vocabulario y los objetivos específicos de cada área. Tu empresa con IA que sabe lo que hace tu empresa.\n\nResultado: cada departamento produce más con el mismo equipo. Los directores toman decisiones con datos reales, no con intuición en reuniones.' },
    { id:'08', bg:'assets/svc-bg-05.jpg', title:'CRM & Pipeline Inteligente', brief:'Tu base de leads fríos reactivada en 72h.', desc:'CRM conectado e inteligente con pipeline visual, automatización de seguimiento y un agente de reactivación que contacta tu base dormida con mensajes personalizados — y entrega solo los leads calientes a tu equipo.\n\nMiles de prospectos que dejaron de responder no están perdidos. Están esperando el mensaje correcto en el momento correcto. Nuestro Agente de Reactivación lo hace en escala, de forma automática y sin costo marginal por contacto.\n\nDiseñado para timeshare, hotelería, inmobiliario y cualquier operación con alto volumen de leads. Closing ratio que se mide en semanas, no en trimestres.' },
    /* ── CONTENIDO & MEDIOS ── */
    { id:'09', bg:'assets/svc-bg-07.jpg', title:'Video & Producción Cinematográfica', brief:'Spots y reels de nivel broadcast que detienen el scroll.', desc:'Producción audiovisual de primer nivel: spots comerciales, reels de marca, documentales corporativos y campañas de contenido — del concepto al producto final listo para cualquier pantalla y plataforma.\n\nUn video bien hecho no se ve — se siente. Y los que se sienten, paran el scroll, generan compartidos y venden. Combinamos dirección creativa de nivel cine con IA generativa para producir en tiempos y costos imposibles para una productora tradicional.\n\nEntregamos piezas calibradas para cada formato: reel 9:16 para redes, spot 16:9 para broadcast, bumper 6s para pre-roll y versión horizontal para OOH digital.' },
    { id:'10', bg:'assets/svc-bg-13.jpg', title:'Avatar Digital Corporativo', brief:'Tu vocero siempre disponible, siempre en punto, sin costo variable.', desc:'Un representante digital de tu marca — con voz, imagen y conocimiento completo de tu empresa — disponible para ventas, soporte, capacitación o presentaciones ejecutivas las 24 horas.\n\nSin vacaciones, sin mal humor, con la consistencia que ningún humano puede garantizar a escala. El mismo mensaje, el mismo tono, la misma precisión — cada vez.\n\nPersonalizable con la voz, apariencia e idioma que mejor represente tu marca. Integrado a tu web, app, pantallas corporativas o videollamadas automatizadas.' },
    { id:'11', bg:'assets/svc-bg-12.jpg', title:'Videojuegos & Gamificación', brief:'Cuando el cliente juega, recuerda. Cuando recuerda, compra.', desc:'Experiencias gamificadas para empresas: activaciones digitales de marca, herramientas de capacitación interactivas, onboarding gamificado para equipos de ventas y mecánicas de loyalty que los clientes no olvidan.\n\nLa neurociencia lo confirma: el aprendizaje y el recuerdo mejoran hasta un 40% cuando hay juego de por medio. Diseñamos cada mecánica alineada a tus KPIs: retención, capacitación, ventas o fidelización.\n\nDesarrollado en tecnología web — sin instalar nada, funciona en cualquier dispositivo, integrado a tu CRM o LMS.' },
    /* ── BRANDING & IDENTIDAD ── */
    { id:'12', bg:'assets/svc-bg-02.jpg', title:'Branding & Identidad Digital', brief:'Una marca fuerte justifica precios más altos. Punto.', desc:'Identidad visual de nivel internacional: logo, paleta, tipografía, manual de marca y todos los activos digitales necesarios para que tu empresa compita en mercados premium.\n\nUna marca fuerte no solo se ve bien — atrae mejores clientes, justifica precios más altos y crea lealtad que la competencia no puede copiar con publicidad. El branding correcto es la inversión más rentable que hace una empresa en crecimiento.\n\nUsamos IA generativa para explorar cientos de posibilidades creativas en días y refinamos con diseño senior. Entregamos brandbook completo listo para producción en cualquier medio.' },
    { id:'13', bg:'assets/svc-bg-09.jpg', title:'UI/UX de Conversión', brief:'El diseño que hace que el visitante tome acción — sin pensarlo.', desc:'Diseño de interfaces digitales optimizadas para convertir: flujos de usuario calibrados, jerarquía visual que guía sin instruir, y experiencias accesibles que cualquier persona puede usar de forma autónoma.\n\nImplementamos WCAG 2.2, estructura ARIA y navegación accesible — incluyendo personas con discapacidades motrices, visuales, cognitivas o auditivas. Tu empresa accede a un mercado que el 99% de tus competidores ignora.\n\nCada decisión de diseño está justificada con datos de comportamiento del usuario. Entregamos prototipos testeados, no suposiciones creativas.' },
    /* ── DATOS & ANALYTICS ── */
    { id:'14', bg:'assets/svc-bg-03.jpg', title:'Data Analytics & Dashboards', brief:'Tus datos dispersos, convertidos en decisiones claras hoy.', desc:'Centralizamos todas las fuentes de datos de tu empresa y las convertimos en dashboards ejecutivos que cualquier director lee sin ser técnico — con KPIs en tiempo real, alertas automáticas y visualizaciones que cuentan la historia completa.\n\nToma decisiones con datos, no con intuición. La diferencia entre una empresa que crece con precisión y una que supone en reuniones cada semana.\n\nConectamos CRM, ERP, plataformas de marketing, sistemas de reservas, e-commerce y cualquier fuente relevante. Construido sobre herramientas open source o las que ya tienes — sin costos de licencia innecesarios.' },
    { id:'15', bg:'assets/svc-bg-14.jpg', title:'Business Intelligence Ejecutivo', brief:'Lo que va a pasar en tu negocio — antes de que pase.', desc:'Modelos predictivos de ventas, churn, demanda y optimización de inventario. BI de nivel enterprise disponible para cualquier empresa que tenga datos históricos y quiera usarlos para crecer con precisión.\n\nSaber lo que va a pasar no es magia — es matemática aplicada a los patrones de tu empresa. Cada modelo es entrenado con tu historia y calibrado para tu sector.\n\nForecast de ocupación para hotelería, predicción de rescisión para timeshare, velocidad de cierre para inmobiliario, rotación de inventario para retail. Reportes automáticos listos para el consejo.' },
    /* ── INFRAESTRUCTURA & ESTRATEGIA ── */
    { id:'16', bg:'assets/svc-bg-11.jpg', title:'Integraciones entre Sistemas', brief:'Todo lo que usas hoy, hablándose. Sin reemplazar nada.', desc:'Conectamos CRMs, ERPs, plataformas de e-commerce, sistemas de pago, calendarios y cualquier herramienta que ya uses hoy — sin reemplazar lo que funciona, solo haciéndolo trabajar junto como un ecosistema coherente.\n\nLa mayoría de las empresas tiene buenas herramientas pero no se hablan entre sí. Eso crea trabajo manual, errores y decisiones tardías. Eso es exactamente lo que resolvemos.\n\nConstruimos el puente entre todos tus sistemas para que compartan información en tiempo real, sin fricción, sin intervención manual y sin que nadie tenga que actualizarlo dos veces.' },
    { id:'17', bg:'assets/svc-bg-17.jpg', title:'Ciberseguridad & IA On-Premise', brief:'Tu información nunca sale de tu red. Ni un solo bit.', desc:'Auditoría de vulnerabilidades, encriptación de datos, acceso por roles y modelos de IA desplegados 100% dentro del ecosistema de tu empresa — sin enviar información a servicios externos.\n\nTu información nunca sale de tu red. Ideal para sectores regulados donde los datos son el activo más valioso: salud, legal, financiero, gobierno y cualquier empresa que no puede permitirse una fuga.\n\nDesplegamos modelos de lenguaje e inteligencia de primer nivel directamente en tus servidores. Tu equipo tiene todo el poder de la IA moderna sin exponer ni un solo dato sensible.' },
    { id:'18', bg:'assets/svc-bg-18.jpg', title:'Capacitación & Transformación Digital', brief:'Tu equipo listo para operar la IA que ya construimos.', desc:'Formación de alto impacto para equipos y directivos: IA aplicada al negocio, automatización práctica, herramientas digitales y cambio de mentalidad. No teoría — casos reales de tu industria con resultados medibles.\n\nTambién construimos agentes de capacitación internos entrenados con los manuales, procesos y objeciones de tu empresa. Disponibles 24/7, miden el avance individual y entregan reportes automáticos a gerentes.\n\nPara empresas que necesitan claridad antes de actuar: entregamos diagnóstico completo, plan de transformación con prioridades, costos y ROI estimado. Sin compromisos. Solo claridad absoluta.' },
    /* ── CONTENIDO & MEDIOS ── */
    { id:'19', bg:'assets/svc-bg-19.png', bgV:'assets/svc-bg-19-v.png', title:'Automatización de Redes Sociales', brief:'Tu marca publicando contenido inteligente todos los días — sin que nadie lo opere.', desc:'Las redes sociales que no publican todos los días no existen para el algoritmo. La inconsistencia no genera comunidad — la destruye. La mayoría de los negocios sabe que necesita estar presente, pero la operación del día a día siempre gana la batalla por el tiempo.\n\nConfiguramos un sistema completo de automatización editorial: calendario de contenido generado por IA, publicación automática en Instagram, Facebook, TikTok, LinkedIn y WhatsApp, con imágenes, copies y hashtags calibrados para cada plataforma y cada audiencia — sin intervención humana diaria.\n\nMonitoreo de métricas, ajuste automático de frecuencia según el engagement real y reportes semanales directos a tu teléfono. Tu marca siempre activa, siempre coherente — en temporada alta, en vacaciones, en lanzamiento o en crisis.' }

  /* ── Service scroll-scrub — módulo idéntico al home, responsive ── */
  (function(){

      '09':193,'10':192,'12':193,'13':200,'14':193,'15':193,'18':200

      '15':'Tu información<br><em>nunca sale de tu red.</em>',
      '18':'Claridad<br><em>antes de invertir.</em>'
    };

    var s = (new URLSearchParams(window.location.search).get('s') || '01').padStart(2,'0');
    var nf = SVC_FRAMES[s];
    if (!nf) return;

    /* Activar modo scrollable — clase en html + body */
    document.documentElement.classList.add('has-scrub');
    document.body.classList.add('has-scrub');

    var zone   = document.getElementById('svc-scrub-zone');
    var canvas = document.getElementById('svcScrubCanvas');
    var pbarFill = document.getElementById('svcScrubPbarFill');
    if (!zone || !canvas) return;

    /* Texto overlay */
    var eyEl = document.getElementById('svcScrubEy');
    var hlEl = document.getElementById('svcScrubHl');
    if (eyEl) eyEl.textContent = '/ ' + s + ' · VICTOR IA';
    if (hlEl) hlEl.innerHTML = SVC_HL[s] || '';

    var ctx  = canvas.getContext('2d', {alpha: false});
    var dir  = 'assets/frames-s' + s;
    var imgs = new Array(nf);
    var loaded = 0, sLast = -1;

    function resize() {
      var w = canvas.offsetWidth  || window.innerWidth;
      var h = canvas.offsetHeight || window.innerHeight;
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width  = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (sLast >= 0 && imgs[sLast]) drawCover(imgs[sLast]);
    }

    function drawCover(img) {
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var cw = canvas.width / dpr, ch = canvas.height / dpr;
      var iw = img.naturalWidth || img.width, ih = img.naturalHeight || img.height;
      if (!iw || !ih) return;
      var ratio = Math.max(cw / iw, ch / ih);
      var w = iw * ratio, h = ih * ratio;
      ctx.fillStyle = '#08090D';
      ctx.fillRect(0, 0, cw, ch);
      ctx.drawImage(img, (cw - w) / 2, (ch - h) / 2, w, h);
    }

    function drawFrame(idx) {
      idx = Math.max(0, Math.min(nf - 1, idx));
      if (idx === sLast) return;
      var img = imgs[idx];
      if (img && img.complete && img.naturalWidth) {
        drawCover(img); sLast = idx;
      } else {
        for (var d = 1; d < 20; d++) {
          if (imgs[idx - d] && imgs[idx - d].complete) { drawCover(imgs[idx - d]); sLast = idx - d; break; }
          if (imgs[idx + d] && imgs[idx + d].complete) { drawCover(imgs[idx + d]); sLast = idx + d; break; }
        }
      }
    }

    requestAnimationFrame(resize);
    window.addEventListener('resize', function(){ clearTimeout(resize._t); resize._t = setTimeout(resize, 100); });

    /* Carga progresiva — primeros 20 frames con alta prioridad */
    var firstDrawn = false;
    for (var i = 0; i < nf; i++) {
      (function(idx){
        var img = new Image();
        if (idx < 20) img.fetchPriority = 'high';
        img.src = dir + '/frame-' + String(idx + 1).padStart(4, '0') + '.webp';
        img.onload = function(){
          imgs[idx] = img; ++loaded;
          if (!firstDrawn && idx === 0) {
            firstDrawn = true;
            requestAnimationFrame(function(){ resize(); drawFrame(0); });
          }
        };
      })(i);
    }

    /* Nav oscuro mientras el scrub esté en pantalla */
    document.body.classList.add('nav-on-dark');
    function updateNavDark(){
      var r = zone.getBoundingClientRect();
      document.body.classList.toggle('nav-on-dark', r.bottom > 0 && r.top < window.innerHeight);
    }

    /* Scroll handler con rAF + progress bar */
    var rafPending = false, targetIdx = 0;
    window.addEventListener('scroll', function(){
      var rect  = zone.getBoundingClientRect();
      var track = zone.offsetHeight - window.innerHeight;
      if (track <= 0) return;
      var progress = Math.max(0, Math.min(1, -rect.top / track));
      targetIdx = Math.floor(progress * nf);
      if (pbarFill) pbarFill.style.height = (progress * 100) + '%';
      updateNavDark();
      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(function(){ drawFrame(targetIdx); rafPending = false; });
      }
    }, { passive: true });
  })();
  </script>
